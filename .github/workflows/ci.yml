name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install requirements dengan memastikan pywin32 diabaikan di Linux
        pip install -r requirements.txt

    - name: Run tests
      run: |
        # Menambahkan folder root ke PYTHONPATH agar semua modul terbaca
        export PYTHONPATH=$PYTHONPATH:$(pwd)
        pytest tests/